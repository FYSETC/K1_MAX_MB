#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
##	SSR Pin - In AC-BED OUT position
heater_pin: !PB0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
##	Adjust Max Power so your heater doesn't warp your bed
max_power: 0.6
min_temp: 0
max_temp: 125
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769

