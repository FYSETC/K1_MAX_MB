[include mainsail.cfg]
# This file contains common pin mappings for the Fysetc Catalyst.K and Catalyst.K ToolHead board.
# To use this config, the firmware should be compiled for the STM32H723 or STM32G431 .
# When calling "make menuconfig", enable "extra low-level configuration setup"
# and select the "25MHZ/12MHz crystal" as clock reference
# For flashing, write the compiled klipper.bin to memory location 0x08000000

# See docs/Config_Reference.md for a description of parameters.
# This config was tested on a Raspberry Pi 4b.

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths							[mcu] section
## rotation_distance                    [stepper_x], [stepper_y] and [extruder] section
## Thermistor types						[extruder] and [heater_bed] sections - See 'sensor types' list at end of file
## Z Endstop Switch location			[scanner] section, if you are using other probes, refer to [probe].
## Homing end position		     		[gcode_macro G32] section
## Z Endstop Switch  offset for Z0		[stepper_z] section
## Probe points							[bed_mesh] section
## PID tune								[extruder] and [heater_bed] sections
## Fine tune E steps					[extruder] section
## custom print start                   [PRINT_START] section

[force_move]
enable_force_move: true

# The custom machine uses the Cartographer.
[scanner]
# For more detailed configuration, please refer to: https://docs.cartographer3d.com/
serial: /dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.2.4.1:1.0
# canbus_uuid: 4e86b8ca91ec
# canbus_interface: can2
backlash_comp: 0.04346
#   Backlash compensation distance for removing Z backlash before measuring
#   the sensor response.
# 
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
x_offset: -40                          
#adjust for your offset
y_offset: 40                       
#adjust for your offset
mode: scan
sensor: cartographer
sensor_alt: carto
#alternate name to call commands. CARTO_TOUCH etc
mesh_runs:2


[mcu]
##  You need to select 'Communication interface' to USB in 'make menuconfig'
##  when you compile Klipper for Catalyst.K_Kit
##	Obtain definition by "ls -l /dev/serial/by-id/"
##--------------------------------------------------------------------
serial: /dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usbv2-0:1.2.1:1.0
# canbus_uuid=4e86b8ca91ec
# canbus_interface: can2

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 1000			        
max_z_velocity: 15			    
max_z_accel: 350
square_corner_velocity: 5.0


[mcu ToolHead]
serial: /dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.2.4.2:1.0
# canbus_uuid=779167137cec
# canbus_interface: can2
# serial: /dev/serial/by-id/usb-Klipper_stm32g431xx_2B002E000D50465236353520-if00
# baud: 230400
# restart_method: command

[extruder]
step_pin: ToolHead:PB7
dir_pin: ToolHead:PB6
enable_pin: !ToolHead:PB9

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  6.9 is a good starting point 
rotation_distance: 6.9
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: ToolHead:PC15
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
sensor_type: EPCOS 100K B57560G104F
sensor_pin: ToolHead:PB2 
pullup_resistor: 4700
min_temp: 0 
max_temp: 320
min_extrude_temp: 10
# pid_Kp: 25.013
# pid_Ki: 2.566
# pid_Kd: 60.966
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5000.0
max_extrude_only_distance: 1500

[tmc2209 extruder]
uart_pin: ToolHead:PA15
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0
##diag_pin: ToolHead:PA13


#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
##	Connected to X-MOT
step_pin: PE11
dir_pin: !PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200 
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 306
position_max: 306
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE7
interpolate: True
run_current: 1.0
# hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin:^PE0
driver_SGTHRS: 75


[stepper_y]
##	Connected to Y-MOT
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 306
position_max: 306
homing_speed: 25
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE15
interpolate: True
run_current: 1.0
# hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin:^PB13
driver_SGTHRS: 80

##	Connected to Z-MOT
[stepper_z]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
rotation_distance: 8
full_steps_per_rotation: 200
gear_ratio: 64:20
microsteps: 16
endstop_pin: probe:z_virtual_endstop 
position_max: 290
position_min: -10
homing_speed: 10
second_homing_speed: 1
homing_retract_dist: 2.0

[tmc2209 stepper_z]
uart_pin: PD10
uart_address: 0
interpolate: True
run_current: 0.8
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

