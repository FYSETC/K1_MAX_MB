#####################################################################
#	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 99999999

[homing_override]
axes: z
set_position_z: 0
gcode:
  G90
  G0 Z10 F600
  G28 X Y
  G0 X150 Y150 F3600

  G28 Z
  G0 Z10 F1800
  G0 X150 Y150 Z10 F3600

[bed_mesh]
speed: 200
horizontal_move_z: 10
mesh_min: 50,50
mesh_max: 250,250
probe_count: 5, 5
fade_start: 1.0
fade_end: 0.0
fade_target:0
split_delta_z: .025
move_check_distance: 10.0
mesh_pps: 2, 2
algorithm: bicubic
bicubic_tension: .2
zero_reference_position: 145.0,155.0

[bed_screws]
screw1: 30,30
screw1_name: front left
screw2: 30,270
screw2_name: back left
screw3: 270,270
screw3_name: back right
screw4: 270,30
screw4_name: front right

[adxl345]
cs_pin: ToolHead:PA0
spi_software_sclk_pin: ToolHead:PA5
spi_software_mosi_pin: ToolHead:PA7
spi_software_miso_pin: ToolHead:PA6
axes_map: -y,z,-x

[resonance_tester]
accel_chip: adxl345
probe_points:
    150,150,10

[temperature_sensor toolhead_temp]
sensor_type: temperature_mcu
sensor_mcu: ToolHead
min_temp: 0
max_temp: 100

[gcode_arcs]
resolution: 1.0

# [probe]
# pin: ToolHead:PB15
# x_offset: 0
# y_offset: 0
# z_offset: 0
# speed: 15.0
# samples: 3
# samples_result: median
# sample_retract_dist: 5.0
# samples_tolerance: 0.01  #0.006
# samples_tolerance_retries: 3

#####################################################################
#	Macros
#####################################################################
[gcode_macro PRINT_START]
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(70)|float %}

    G28
    G90                            ; Use absolute coordinates
    M190 S{BED_TEMP}               ; Heat bed for probing
    M109 S{EXTRUDER_TEMP}          ; Set and wait for nozzle to reach printing temperature
    
    G1 X150 Y150 Z20 F3000                   ; move nozzle away from bed
    # SET_GCODE_OFFSET Z_ADJUST=+10.7 MOVE=1
    SET_PIN PIN=LED VALUE=1.0


[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament
    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0  X125 Y250 F3600            ; park nozzle at rear
    BED_MESH_CLEAR
    SET_PIN PIN=LED VALUE=0

[display_status]

[pause_resume]

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    ##### set defaults #####
    {% set x = params.X|default(230) %}      #edit to your park position
    {% set y = params.Y|default(230) %}      #edit to your park position
    {% set z = params.Z|default(10)|float %} #edit to your park position
    {% set e = params.E|default(1) %}        #edit to your retract length
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set lift_z = z|abs %}
    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### end of definitions #####
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E-{e} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}    
      G1 Z{z_safe}
      G90
      G1 X{x} Y{y} F6000
    {% else %}
      {action_respond_info("Printer not homed")}
    {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    ##### set defaults #####
    {% set e = params.E|default(1) %} #edit to your retract length
    #### get VELOCITY parameter if specified ####
    {% if 'VELOCITY' in params|upper %}
      {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
    {%else %}
      {% set get_params = "" %}
    {% endif %}
    ##### end of definitions #####
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E{e} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}  
    RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
  SET_FAN_SPEED FAN=auxiliary_fan SPEED=0
  SET_PIN PIN=LED VALUE=0


[virtual_sdcard]
path: ~/printer_data/gcodes


